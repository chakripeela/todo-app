name: Deploy to Azure App Service

on: workflow_dispatch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Copy web.config to dist
        run: cp web.config dist/

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp app.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp .deployment deploy/

      - name: Deploy to Azure App Service
        uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy/
          clean: true

      - name: Post-deployment message
        run: |
          echo "✅ Deployment complete!"
          echo "❗ Important: Ensure your App Service startup command is set to 'npm start'"
          echo "   Go to Azure Portal → App Service → Configuration → General settings → Startup command"
          echo "   OR use: az webapp config set --resource-group YOUR_RG --name YOUR_APP_NAME --startup-file 'npm start'"
