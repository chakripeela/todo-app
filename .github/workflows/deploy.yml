name: Deploy to Azure App Service

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Select which App Service deployment target to use
        required: true
        default: both
        type: choice
        options:
          - primary
          - dr
          - both

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp server.js deploy/
          cp package.json deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to primary Azure App Service
        if: ${{ github.event.inputs.deploy_target == 'primary' || github.event.inputs.deploy_target == 'both' }}
        uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          package: deploy/
          clean: true

      - name: Deploy to DR Azure App Service
        if: ${{ github.event.inputs.deploy_target == 'dr' || github.event.inputs.deploy_target == 'both' }}
        uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_DR_APP_NAME }}
          package: deploy/
          clean: true
